ktor {
  environment = prod
  environment = ${?KTOR_ENV}

  deployment {
    port = 8080
    port = ${?PORT}
    watch = [lunatech-chef]
  }
  application {
    modules = [com.lunatech.chef.api.ApplicationKt.module]
  }
}

database {
  url = "jdbc:postgresql://"${POSTGRESQL_ADDON_HOST}":"${POSTGRESQL_ADDON_PORT}"/"${POSTGRESQL_ADDON_DB}
  user = ${POSTGRESQL_ADDON_USER}
  password = ${POSTGRESQL_ADDON_PASSWORD}
  max-pool-size = 2
  max-pool-size = ${?POSTGRES_MAX_POOL_SIZE}
}

jwt {
  jwkProvider = "https://keycloak.lunatech.com/realms/lunatech/protocol/openid-connect/certs"
  jwkProvider = ${?JWK_PROVIDER}
  issuer = "https://keycloak.lunatech.com/realms/lunatech"
  issuer = ${?JWK_ISSUER}
  clientId = "lunachef-local"
  clientId = ${?JWT_CLIENT_ID}
}

monthly-report-email {
  subject = "Lunatech chef monthly report"
  from = "chef@lunatech.nl"
  to = "finance@lunatech.nl"
  to = ${?EMAIL_RECIPIENTS}
}

mailer {
  host = "smtp.mailpace.com"
  host = ${?MAILPACE_SMTP_SERVER}
  user = ${?MAILPACE_API_KEY}
  password = ${?MAILPACE_API_KEY}
  port = 587
  port = ${?SENDGRID_PORT}
}

slackbot {
  enabled = false
  enabled = ${?SLACKBOT_ENABLED}
  token = ""
  token = ${?SLACK_USER_TOKEN}
  signingSecret = ""
  signingSecret = ${?SLACK_SIGNING_SECRET}
  cron = "0 0 10 ? * MON,TUE"
  cron = ${?SLACKBOT_CRON}
  publicUrl = "https://lunch.lunatech.nl"
}

recurrent-schedules {
  enabled = false
  enabled = ${?RECURRENT_SCHEDULES_ENABLED}
  cron = "0 0 1 ? * MON"
  cron = ${?RECURRENT_SCHEDULES_CRON}
}

monthly-reports {
  enabled = false
  enabled = ${?MONTHLY_REPORTS_ENABLED}
  cron = "0 0 2 1 * ?"
  cron = ${?MONTHLY_REPORTS_CRON}
}

include "override.conf"
