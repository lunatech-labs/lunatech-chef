version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "07:00"
      timezone: "Europe/Amsterdam"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/frontend"
    cooldown:
      default-days: 5
    schedule:
      interval: "monthly"
      time: "07:00"
      timezone: "Europe/Amsterdam"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "07:00"
      timezone: "Europe/Amsterdam"
    groups:
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # CodeQL's Kotlin extractor only supports versions below 2.3.30 (unstable
      # compiler IR API, needs an explicit bump per Kotlin release upstream).
      # Remove once https://github.com/github/codeql/issues/21938 is resolved.
      - dependency-name: "org.jetbrains.kotlin.jvm"
        versions: [">=2.3.30"]
      - dependency-name: "org.jetbrains.kotlin.plugin.serialization"
        versions: [">=2.3.30"]
